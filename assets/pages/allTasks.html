<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <!-- Lucide (needed for icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body style="margin-top: 70px">
    <task-sidebar></task-sidebar>

    <div class="name-section" style="margin-top: 0; padding-top: 20px !important;">
      <h1>Your Tasks</h1>
      <div id="new-task-button">
        <button id="open-modal-btn">+ New Task</button>
      </div>
    </div>

    <div class="get-all-tasks" style="padding-top: 0;">
      <div class="task-filters">
        <button data-filter="all">All</button>
        <button data-filter="critical">Critical</button>
        <button data-filter="high">High</button>
        <button data-filter="medium">Medium</button>
        <button data-filter="low">Low</button>
      </div>
      <div id="task-container"></div>
      <div id="task-container"></div>
    </div>

    <!-- New Task Modal -->
    <form id="task-form" class="modal-body">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Create New Task</h2>
          <span id="close-modal">&times;</span>
        </div>
        <div class="modal-body">
          <input type="text" id="task-title" placeholder="Task title" required />
          <textarea id="task-desc" placeholder="Task description" required></textarea>
          <select id="task-priority" required>
            <option value="" disabled selected>Select Priority</option>
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
            <option value="critical">Critical</option>
          </select>
          <input type="date" id="task-date" required />
          <button id="save-task">Save Task</button>
        </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../javascript/sidebar.js"></script>
    <script src="../javascript/allTasks.js"></script>
  </body>
</html>
